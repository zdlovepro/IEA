spring:
  datasource:
    url: jdbc:mysql://${MYSQL_HOST:localhost}:${MYSQL_PORT:3306}/${MYSQL_DATABASE:interactive_edu}?useSSL=false&serverTimezone=UTC&characterEncoding=utf8mb4
    username: ${MYSQL_USERNAME:root}
    password: ${MYSQL_PASSWORD:change-me-mysql-password}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: ${JPA_DDL_AUTO:update}
    show-sql: ${JPA_SHOW_SQL:true}
    properties:
      hibernate:
        format_sql: true
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      database: ${REDIS_DATABASE:0}
      password: ${REDIS_PASSWORD:}

minio:
  endpoint: ${MINIO_ENDPOINT:http://localhost:9000}
  access-key: ${MINIO_ACCESS_KEY:change-me-minio-access-key}
  secret-key: ${MINIO_SECRET_KEY:change-me-minio-secret-key}
  bucket: ${MINIO_BUCKET:courseware}
  secure: ${MINIO_SECURE:false}

storage:
  type: minio

python:
  client:
    base-url: ${PYTHON_CLIENT_BASE_URL:http://localhost:8001}
    script-generate-path: ${PYTHON_SCRIPT_GENERATE_PATH:/python/v1/script/generate}
    qa-path: ${PYTHON_QA_PATH:/python/v1/qa/ask-text}
    qa-stream-path: ${PYTHON_QA_STREAM_PATH:/python/v1/qa/stream}

asr:
  enabled: ${ASR_ENABLED:false}
  provider: ${ASR_PROVIDER:qwen}
  qwen:
    api-key: ${ASR_QWEN_API_KEY:${DASHSCOPE_API_KEY:}}
    base-url: ${QWEN_ASR_BASE_URL:https://dashscope.aliyuncs.com/compatible-mode/v1}
    model: ${QWEN_ASR_MODEL:qwen3-asr-flash}
    enable-itn: ${QWEN_ASR_ENABLE_ITN:true}
    language: ${QWEN_ASR_LANGUAGE:}
    max-file-size-mb: ${QWEN_ASR_MAX_FILE_SIZE_MB:10}
    timeout-seconds: ${QWEN_ASR_TIMEOUT_SECONDS:60}

tts:
  enabled: ${TTS_ENABLED:false}
  aliyun:
    api-key: ${TTS_DASHSCOPE_API_KEY:${DASHSCOPE_API_KEY:}}
    model: ${TTS_DASHSCOPE_MODEL:cosyvoice-v3-flash}
    voice: ${TTS_DASHSCOPE_VOICE:longanyang}
    websocket-url: ${TTS_DASHSCOPE_WEBSOCKET_URL:wss://dashscope.aliyuncs.com/api-ws/v1/inference}
    format: ${TTS_DASHSCOPE_FORMAT:mp3}
    sample-rate: ${TTS_DASHSCOPE_SAMPLE_RATE:24000}
    speech-rate: ${TTS_DASHSCOPE_SPEECH_RATE:0}
    pitch-rate: ${TTS_DASHSCOPE_PITCH_RATE:0}
    volume: ${TTS_DASHSCOPE_VOLUME:50}
