spring:
  datasource:
    url: jdbc:mysql://${MYSQL_HOST:localhost}:${MYSQL_PORT:3306}/${MYSQL_DATABASE:interactive_edu}?useSSL=false&serverTimezone=UTC&characterEncoding=utf8mb4
    username: ${MYSQL_USERNAME:root}
    password: ${MYSQL_PASSWORD:change-me-mysql-password}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: ${JPA_DDL_AUTO:update}
    show-sql: ${JPA_SHOW_SQL:true}
    properties:
      hibernate:
        format_sql: true
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      database: ${REDIS_DATABASE:0}
      password: ${REDIS_PASSWORD:}

minio:
  endpoint: ${MINIO_ENDPOINT:http://localhost:9000}
  access-key: ${MINIO_ACCESS_KEY:change-me-minio-access-key}
  secret-key: ${MINIO_SECRET_KEY:change-me-minio-secret-key}
  bucket: ${MINIO_BUCKET:courseware}
  secure: ${MINIO_SECURE:false}

storage:
  type: minio

python:
  client:
    base-url: ${PYTHON_CLIENT_BASE_URL:http://localhost:8001}

tts:
  enabled: ${TTS_ENABLED:false}
  aliyun:
    app-key: ${TTS_ALIYUN_APP_KEY:}
    access-key-id: ${TTS_ALIYUN_ACCESS_KEY_ID:}
    access-key-secret: ${TTS_ALIYUN_ACCESS_KEY_SECRET:}
