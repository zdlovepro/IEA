spring:
  datasource:
    url: jdbc:mysql://<your-prod-host>:3306/edu?useSSL=true&serverTimezone=UTC&characterEncoding=utf8mb4
    username: ${MYSQL_USER:change_me}
    password: ${MYSQL_PASSWORD:change_me}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: none
    show-sql: false
  data:
    redis:
      host: <your-redis-host>
      port: 6379
      database: 0
      password: ${REDIS_PASSWORD:}

minio:
  endpoint: https://<your-minio-host>
  access-key: ${MINIO_ACCESS_KEY:change_me}
  secret-key: ${MINIO_SECRET_KEY:change_me}
  bucket: courseware
  secure: true

server:
  port: 8080

logging:
  level:
    root: INFO
    com.interactive.edu: INFO

python:
  client:
    base-url: ${PYTHON_CLIENT_BASE_URL:http://localhost:8001}
    script-generate-path: ${PYTHON_SCRIPT_GENERATE_PATH:/python/v1/script/generate}
