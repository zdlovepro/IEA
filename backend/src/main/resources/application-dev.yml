spring:
  datasource:
    url: jdbc:mysql://localhost:3306/edu?useSSL=false&serverTimezone=UTC&characterEncoding=utf8mb4
    username: edu_user
    password: edu_pass
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
  data:
    redis:
      host: localhost
      port: 6379
      database: 0
      password:

minio:
  endpoint: http://localhost:9000
  access-key: minioadmin
  secret-key: minioadmin
  bucket: courseware
  secure: false

server:
  port: 8080

logging:
  level:
    root: INFO
    com.interactive.edu: DEBUG
