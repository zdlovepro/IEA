spring:
  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.jdbc.DataSourceAutoConfiguration
      - org.springframework.boot.autoconfigure.orm.jpa.HibernateJpaAutoConfiguration
      - org.springframework.boot.autoconfigure.data.jpa.JpaRepositoriesAutoConfiguration

storage:
  type: local
  local-base-dir: ./data/courseware

python:
  client:
    base-url: ${PYTHON_CLIENT_BASE_URL:http://localhost:8001}

tts:
  enabled: ${TTS_ENABLED:false}
  aliyun:
    api-key: ${TTS_DASHSCOPE_API_KEY:${DASHSCOPE_API_KEY:}}
    model: ${TTS_DASHSCOPE_MODEL:cosyvoice-v3-flash}
    voice: ${TTS_DASHSCOPE_VOICE:longanyang}
    websocket-url: ${TTS_DASHSCOPE_WEBSOCKET_URL:wss://dashscope.aliyuncs.com/api-ws/v1/inference}
    format: ${TTS_DASHSCOPE_FORMAT:mp3}
    sample-rate: ${TTS_DASHSCOPE_SAMPLE_RATE:24000}
    speech-rate: ${TTS_DASHSCOPE_SPEECH_RATE:0}
    pitch-rate: ${TTS_DASHSCOPE_PITCH_RATE:0}
    volume: ${TTS_DASHSCOPE_VOLUME:50}
